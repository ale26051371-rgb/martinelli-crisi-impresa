<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 327" preserveAspectRatio="xMidYMid meet">
  <!-- M monumentale al centro, stile classico romano -->
  <g fill="#000">
    <!-- Lettera M con grazie marcate -->
    <path d="M 95 60 L 95 200 L 105 200 L 105 80 L 175 200 L 185 200 L 255 80 L 255 200 L 265 200 L 265 60 L 245 60 L 180 175 L 115 60 Z"/>
    <!-- Aste serif decorative -->
    <rect x="80" y="58" width="35" height="4"/>
    <rect x="245" y="58" width="35" height="4"/>
    <rect x="85" y="200" width="35" height="4"/>
    <rect x="160" y="200" width="40" height="4"/>
    <rect x="240" y="200" width="35" height="4"/>
    
    <!-- Colonna classica simbolica al centro della M (tipo logo originale) -->
    <rect x="170" y="120" width="20" height="80"/>
    <rect x="165" y="115" width="30" height="6"/>
    <rect x="165" y="200" width="30" height="6"/>
    <rect x="173" y="113" width="14" height="3"/>
    
    <!-- MARTINELLI -->
    <text x="180" y="245" font-family="Georgia, serif" font-size="34" font-weight="500" text-anchor="middle" letter-spacing="2">MARTINELLI</text>
    
    <!-- Linee decorative laterali -->
    <line x1="50" y1="278" x2="100" y2="278" stroke="#000" stroke-width="1.5"/>
    <line x1="260" y1="278" x2="310" y2="278" stroke="#000" stroke-width="1.5"/>
    
    <!-- CRISI DI IMPRESA -->
    <text x="180" y="283" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="middle" letter-spacing="3">CRISI DI IMPRESA</text>
  </g>
</svg>